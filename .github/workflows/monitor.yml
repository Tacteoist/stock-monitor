name: Stock Monitor

on:
  schedule:
    # Runs 3x per day, Monday-Friday
    - cron: '30 14 * * 1-5'   # 10:30 AM ET
    - cron: '0 17 * * 1-5'    # 1:00 PM ET
    - cron: '45 19 * * 1-5'   # 3:45 PM ET
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance
      - name: Run monitor
        run: python monitor.py
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
