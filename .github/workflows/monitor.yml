name: Stock Monitor

on:
  schedule:
    # Times converted to UTC
    - cron: '30 14 * * 1-5'  # 10:30 AM ET
    - cron: '0 18 * * 1-5'   # 1:00 PM ET
    - cron: '45 19 * * 1-5'  # 3:45 PM ET
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Show repo structure (debug)
        run: |
          echo "Listing all files:"
          ls -R

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run Portfolio Monitor
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python monitor.py

      - name: Commit & Push Cache Files
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intraday_cache.json data/dividend_cache.json data/alert_state.json
          git commit -m "Update portfolio caches" || echo "No changes to commit"
          git push https://x-access-token:${GH_PAT}@github.com/Tacteoist/stock-monitor.git HEAD:main
